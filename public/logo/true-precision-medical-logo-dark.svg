<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 225" width="810" height="225" role="img" aria-labelledby="title">
  <title id="title">True Precision Medical logo dark</title>
  <defs>
    <filter id="darkify">
      <feColorMatrix
        type="matrix"
        values="
          0 0 0 0 0.07
          0 0 0 0 0.07
          0 0 0 0 0.07
          0 0 0 1 0"
      />
    </filter>
  </defs>
  <image
    href="/logo/true-precision-medical-logo.svg"
    x="0"
    y="0"
    width="810"
    height="225"
    preserveAspectRatio="xMidYMid meet"
    filter="url(#darkify)"
  />
</svg>
